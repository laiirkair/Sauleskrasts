<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saules Krasts — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --sand:#F5EDD6;--sand-light:#FAF5E9;
  --navy:#1C2E4A;--navy-dark:#0F1D30;
  --gold:#C8882A;--gold-light:#E8A84A;
  --sea:#5A8FA3;--moss:#5E8A60;--coral:#C84A3A;
  --white:#FAFAF8;--text:#2C3540;--text-light:#5A6570;
  --shadow:0 4px 24px rgba(28,46,74,.10);
  --shadow-lg:0 12px 48px rgba(28,46,74,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;color:var(--text);background:var(--navy-dark);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── LOGIN ─────────────────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;z-index:1000;background:var(--navy-dark);display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{background:var(--white);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:var(--shadow-lg);text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--navy);margin-bottom:.3rem}
.login-logo em{font-style:italic;color:var(--gold)}
.login-sub{font-size:.8rem;color:var(--text-light);margin-bottom:2rem;letter-spacing:.05em;text-transform:uppercase}
.login-input{width:100%;padding:.85rem 1rem;border:1.5px solid rgba(0,0,0,.1);border-radius:10px;font-family:inherit;font-size:1rem;color:var(--text);margin-bottom:1rem;transition:border-color .2s;background:var(--sand-light)}
.login-input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:.9rem;background:var(--navy);color:white;border:none;border-radius:10px;font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s;letter-spacing:.04em}
.login-btn:hover{background:var(--gold)}
.login-error{color:var(--coral);font-size:.82rem;margin-top:.7rem;display:none}

/* ── APP SHELL ─────────────────────────────────────────────────── */
#app{display:none;min-height:100vh;background:var(--sand-light)}
header{background:var(--navy);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:white}
.header-title em{font-style:italic;color:var(--gold-light)}
.header-right{display:flex;align-items:center;gap:1rem}
.header-badge{font-size:.7rem;background:rgba(200,136,42,.2);border:1px solid var(--gold);color:var(--gold-light);padding:.25rem .7rem;border-radius:20px;letter-spacing:.08em;font-weight:600}
.logout-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:.75rem;padding:.35rem .8rem;border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit}
.logout-btn:hover{background:var(--coral);border-color:var(--coral);color:white}

/* ── LAYOUT ─────────────────────────────────────────────────────── */
.main-layout{display:grid;grid-template-columns:1fr 380px;gap:1.5rem;max-width:1300px;margin:0 auto;padding:1.5rem}
@media(max-width:900px){.main-layout{grid-template-columns:1fr}}

/* ── CALENDAR ──────────────────────────────────────────────────── */
.cal-card{background:white;border-radius:16px;padding:1.5rem;box-shadow:var(--shadow)}
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;gap:.8rem}
.cal-month-label{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--navy);font-weight:500;text-align:center;flex:1;text-transform:capitalize}
.cal-nav{background:var(--sand-light);border:1px solid rgba(0,0,0,.08);color:var(--navy);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.cal-nav:hover{background:var(--gold);border-color:var(--gold);color:white}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-wd{text-align:center;font-size:.65rem;font-weight:700;letter-spacing:.07em;color:var(--text-light);padding:.35rem 0;text-transform:uppercase}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:.3rem;border-radius:8px;background:var(--sand-light);border:1.5px solid transparent;cursor:pointer;transition:all .18s;position:relative}
.cal-day:hover{border-color:var(--gold);background:rgba(200,136,42,.07);transform:translateY(-1px)}
.cal-day.active{border-color:var(--gold);background:rgba(200,136,42,.12);box-shadow:0 2px 10px rgba(200,136,42,.2)}
.cal-day.empty{background:transparent;cursor:default;pointer-events:none}
.cal-day.past{opacity:.35}
.cal-day.today .day-n{color:var(--gold);font-weight:800}
.day-n{font-size:.8rem;font-weight:600;color:var(--navy);line-height:1;margin-bottom:.18rem}
.day-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:36px}
.d-dot{width:5px;height:5px;border-radius:50%}
.d-free{background:var(--moss)}
.d-booked{background:var(--coral)}
.d-partial{background:var(--gold)}
.cal-legend{display:flex;gap:1rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,.06);flex-wrap:wrap;justify-content:center}
.leg-item{display:flex;align-items:center;gap:.35rem;font-size:.72rem;color:var(--text-light)}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* ── TODAY SUMMARY ─────────────────────────────────────────────── */
.today-card{background:linear-gradient(135deg,var(--navy),#263d5e);border-radius:16px;padding:1.2rem 1.4rem;margin-bottom:1.5rem;color:white}
.today-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-light);margin-bottom:.4rem;font-weight:600}
.today-stats{display:flex;gap:1.2rem;flex-wrap:wrap}
.today-stat{text-align:center}
.today-stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;color:white}
.today-stat-lbl{font-size:.65rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.07em}

/* ── DETAIL PANEL ──────────────────────────────────────────────── */
.detail-panel{display:flex;flex-direction:column;gap:1rem}
.detail-header{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--navy);font-weight:400;padding:.2rem 0}
.detail-header em{font-style:italic;color:var(--gold)}
.no-selection{background:white;border-radius:16px;padding:2rem;text-align:center;color:var(--text-light);font-size:.88rem;box-shadow:var(--shadow)}
.no-selection .icon{font-size:2.5rem;margin-bottom:.8rem;display:block}

/* Booking card */
.booking-card{background:white;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);transition:all .2s}
.booking-card-head{padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.bc-cabin{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:white}
.bc-type{font-size:.68rem;letter-spacing:.1em;padding:.2rem .6rem;border-radius:12px;border:1px solid;font-weight:600}
.type-lux{background:rgba(200,136,42,.25);border-color:var(--gold-light);color:#E8C87A}
.type-family{background:rgba(94,138,96,.25);border-color:#8DC490;color:#8DC490}
.type-double{background:rgba(90,143,163,.25);border-color:#A8CADC;color:#A8CADC}
.booking-card-body{padding:1rem 1.1rem}

.info-row{display:flex;align-items:flex-start;gap:.7rem;padding:.4rem 0;border-bottom:1px solid rgba(0,0,0,.05)}
.info-row:last-child{border-bottom:none}
.info-icon{font-size:.95rem;flex-shrink:0;width:20px;text-align:center;margin-top:.1rem}
.info-content{flex:1;min-width:0}
.info-label{font-size:.65rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-light);margin-bottom:.15rem}
.info-val{font-size:.86rem;color:var(--navy);font-weight:500;word-break:break-word;line-height:1.4}
.info-val a{color:var(--navy);text-decoration:none}
.info-val a:hover{color:var(--gold)}

.extras-chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.3rem}
.extra-chip{font-size:.7rem;padding:.2rem .55rem;border-radius:12px;font-weight:600}
.chip-yes{background:rgba(94,138,96,.12);color:var(--moss);border:1px solid rgba(94,138,96,.3)}
.chip-bedlinen{background:rgba(200,136,42,.1);color:var(--gold);border:1px solid rgba(200,136,42,.3)}
.chip-none{background:rgba(0,0,0,.04);color:var(--text-light);border:1px solid rgba(0,0,0,.08)}

/* Status badge + selector */
.status-row{display:flex;align-items:center;gap:.6rem;padding:.6rem 1.1rem;background:var(--sand-light);border-top:1px solid rgba(0,0,0,.06)}
.status-badge{font-size:.7rem;font-weight:700;letter-spacing:.08em;padding:.25rem .7rem;border-radius:20px;text-transform:uppercase}
.s-pending{background:rgba(200,136,42,.15);color:#B07820;border:1px solid rgba(200,136,42,.3)}
.s-confirmed{background:rgba(94,138,96,.15);color:#3d6b3f;border:1px solid rgba(94,138,96,.3)}
.s-cancelled{background:rgba(200,74,58,.12);color:var(--coral);border:1px solid rgba(200,74,58,.25)}
.status-select{font-size:.76rem;padding:.3rem .6rem;border:1.5px solid rgba(0,0,0,.1);border-radius:7px;font-family:inherit;color:var(--text);background:white;cursor:pointer;transition:border-color .2s}
.status-select:focus{outline:none;border-color:var(--gold)}
.status-save{padding:.3rem .75rem;background:var(--gold);color:white;border:none;border-radius:7px;font-size:.72rem;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit}
.status-save:hover{background:var(--navy)}
.status-saved{color:var(--moss);font-size:.72rem;font-weight:600;display:none}

/* Reservation number */
.res-nr{font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:.1em;color:var(--text-light)}

/* No bookings */
.no-bookings{background:var(--sand-light);border-radius:10px;padding:1.2rem;text-align:center;color:var(--text-light);font-size:.84rem;border:1.5px dashed rgba(0,0,0,.1)}

/* ── LOADING ─────────────────────────────────────────────────────── */
.loading{text-align:center;padding:2rem;color:var(--text-light);font-size:.88rem}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid rgba(28,46,74,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ─────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:.7rem 1.4rem;border-radius:10px;font-size:.82rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── RESPONSIVE ─────────────────────────────────────────────────── */
@media(max-width:600px){
  .main-layout{padding:1rem;gap:1rem}
  .cal-card{padding:1rem}
  header{padding:.8rem 1rem}
  .header-title{font-size:1.1rem}
  .today-stats{gap:.8rem}
  .today-stat-num{font-size:1.6rem}
}
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Saules <em>Krasts</em></div>
    <div class="login-sub">Administratora panelis</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="Parole" autocomplete="current-password">
    <button class="login-btn" onclick="checkLogin()">Ieiet →</button>
    <div class="login-error" id="login-error">❌ Nepareiza parole</div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="header-title">Saules <em>Krasts</em> · Admin</div>
    <div class="header-right">
      <div class="header-badge">🔒 ADMIN</div>
      <button class="logout-btn" onclick="logout()">Iziet</button>
    </div>
  </header>

  <div class="main-layout">
    <!-- LEFT: Calendar -->
    <div>
      <div class="today-card" id="today-card">
        <div class="today-label" id="today-label">Ielādē...</div>
        <div class="today-stats" id="today-stats"></div>
      </div>
      <div class="cal-card">
        <div class="cal-top">
          <button class="cal-nav" onclick="changeMonth(-1)">←</button>
          <div class="cal-month-label" id="cal-month-label"></div>
          <button class="cal-nav" onclick="changeMonth(1)">→</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--moss)"></div>Brīva</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--coral)"></div>Aizņemta</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>Daļēji</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Detail panel -->
    <div class="detail-panel" id="detail-panel">
      <div class="no-selection">
        <span class="icon">📅</span>
        Uzspiedi uz kādas dienas kalendārā,<br>lai redzētu rezervācijas
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── CONFIG ─────────────────────────────────────────────────────── */
const SB_URL  = 'https://kkpwxygfihxyzhrfvqim.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrcHd4eWdmaWh4eXpocmZ2cWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTA3MjksImV4cCI6MjA5Njc2NjcyOX0.6DSU-vtKHs20GKVxZaMATRhMh1KStzO4v_IqKWwmzv0';
const ADMIN_PASS_HASH = '7a3f9c2e1b8d4f6a0e5c7b9d2f4a8e1c3b5d7f9a2e4c6b8d0f2a4c6e8b0d2f4'; // placeholder — replaced below
const PASS = 'VissIzdosies#2026';

const CABINS = [
  {id:1,name:'Mājiņa Nr. 1',type:'family',color:'#2d5a3d'},
  {id:2,name:'Mājiņa Nr. 2',type:'family',color:'#2d5a3d'},
  {id:3,name:'Mājiņa Nr. 3',type:'double',color:'#2e5a7a'},
  {id:4,name:'Mājiņa Nr. 4',type:'double',color:'#2e5a7a'},
  {id:5,name:'Mājiņa Nr. 5',type:'lux',   color:'#7a5a1a'},
];

const EXTRA_NAMES = {
  grill:    '🔥 Grils',
  coal:     '⚫ Ogles',
  umbrella: '⛱ Saulessargs',
  chair:    '🪑 Krēsls',
};

let sb, bookings = [], calYear = new Date().getFullYear(), calMonth = new Date().getMonth(), selectedDate = null;

/* ── LOGIN ─────────────────────────────────────────────────────── */
function checkLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASS) {
    sessionStorage.setItem('sk_admin', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
function logout() {
  sessionStorage.removeItem('sk_admin');
  location.reload();
}
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkLogin();
});

/* ── INIT ─────────────────────────────────────────────────────── */
async function initApp() {
  sb = window.supabase.createClient(SB_URL, SB_KEY);
  await loadBookings();
  renderTodayStats();
  renderCalendar();
}

/* ── DATA ─────────────────────────────────────────────────────── */
async function loadBookings() {
  try {
    const { data, error } = await sb.from('bookings')
      .select('*')
      .order('checkin_date', { ascending: true });
    if (error) throw error;
    bookings = data || [];
    console.log('Ielādētas rezervācijas:', bookings.length);
  } catch(e) {
    console.error('Kļūda:', e);
    showToast('❌ Nevar ielādēt datus: ' + e.message, true);
  }
}

function bookingsOnDate(ymd) {
  return bookings.filter(b =>
    b.checkin_date <= ymd &&
    b.checkout_date > ymd &&
    b.status !== 'cancelled'
  );
}

function isCabinBooked(cabinId, ymd) {
  return bookings.some(b =>
    b.cabin_id === cabinId &&
    b.checkin_date <= ymd &&
    b.checkout_date > ymd &&
    b.status !== 'cancelled'
  );
}

/* ── TODAY STATS ─────────────────────────────────────────────── */
function renderTodayStats() {
  const today = toYMD(new Date());
  const todayBookings = bookingsOnDate(today);
  const freeCount  = 5 - todayBookings.length;
  const checkinsToday  = bookings.filter(b => b.checkin_date === today && b.status !== 'cancelled').length;
  const checkoutsToday = bookings.filter(b => b.checkout_date === today && b.status !== 'cancelled').length;
  const pendingCount   = bookings.filter(b => b.status === 'pending').length;

  const d = new Date();
  const dateStr = d.toLocaleDateString('lv-LV', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  document.getElementById('today-label').textContent = dateStr;
  document.getElementById('today-stats').innerHTML = `
    <div class="today-stat"><div class="today-stat-num">${todayBookings.length}</div><div class="today-stat-lbl">Aizņemtas</div></div>
    <div class="today-stat"><div class="today-stat-num">${freeCount}</div><div class="today-stat-lbl">Brīvas</div></div>
    <div class="today-stat"><div class="today-stat-num" style="color:var(--gold-light)">${checkinsToday}</div><div class="today-stat-lbl">Ierodas</div></div>
    <div class="today-stat"><div class="today-stat-num" style="color:rgba(255,255,255,.6)">${checkoutsToday}</div><div class="today-stat-lbl">Izbrauc</div></div>
    <div class="today-stat"><div class="today-stat-num" style="color:#E8A84A">${pendingCount}</div><div class="today-stat-lbl">Gaida apstiprin.</div></div>
  `;
}

/* ── CALENDAR ─────────────────────────────────────────────────── */
function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

const MONTHS = ['Janvāris','Februāris','Marts','Aprīlis','Maijs','Jūnijs','Jūlijs','Augusts','Septembris','Oktobris','Novembris','Decembris'];
const WDAYS  = ['Pr','Ot','Tr','Ce','Pk','Se','Sv'];

function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  const grid  = document.getElementById('cal-grid');
  label.textContent = MONTHS[calMonth] + ' ' + calYear;

  const today = new Date(); today.setHours(0,0,0,0);
  let firstDow = new Date(calYear, calMonth, 1).getDay();
  firstDow = firstDow === 0 ? 6 : firstDow - 1;
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = WDAYS.map(d => `<div class="cal-wd">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) html += `<div class="cal-day empty"></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const ymd  = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const date = new Date(calYear, calMonth, day);
    const isPast   = date < today;
    const isToday  = date.getTime() === today.getTime();
    const isActive = ymd === selectedDate;

    const onDate   = bookingsOnDate(ymd);
    const bookedN  = onDate.length;
    const checkins = bookings.filter(b => b.checkin_date === ymd && b.status !== 'cancelled').length;
    const checkouts= bookings.filter(b => b.checkout_date === ymd && b.status !== 'cancelled').length;

    let dots = '';
    CABINS.forEach(c => {
      const booked = isCabinBooked(c.id, ymd);
      dots += `<div class="d-dot ${booked ? 'd-booked' : 'd-free'}" title="${c.name}: ${booked ? 'aizņemta' : 'brīva'}"></div>`;
    });

    // Indicator badges
    let badges = '';
    if (checkins > 0)  badges += `<div style="position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--moss)" title="${checkins} ierodas"></div>`;

    const cls = ['cal-day', isPast?'past':'', isToday?'today':'', isActive?'active':''].filter(Boolean).join(' ');
    html += `
      <div class="${cls}" onclick="selectDate('${ymd}')" title="${ymd}">
        ${badges}
        <div class="day-n">${day}</div>
        <div class="day-dots">${dots}</div>
      </div>`;
  }
  grid.innerHTML = html;
}

/* ── SELECT DATE ──────────────────────────────────────────────── */
function selectDate(ymd) {
  selectedDate = ymd;
  renderCalendar();
  renderDetail(ymd);
}

/* ── DETAIL PANEL ─────────────────────────────────────────────── */
function renderDetail(ymd) {
  const panel = document.getElementById('detail-panel');
  const dateObj = new Date(ymd + 'T00:00:00');
  const dateStr = dateObj.toLocaleDateString('lv-LV', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  const onDate    = bookingsOnDate(ymd);
  const checkins  = bookings.filter(b => b.checkin_date  === ymd && b.status !== 'cancelled');
  const checkouts = bookings.filter(b => b.checkout_date === ymd && b.status !== 'cancelled');

  // All cabins status for this date
  const freeIds   = CABINS.filter(c => !isCabinBooked(c.id, ymd)).map(c => c.id);

  let html = `
    <div>
      <div class="detail-header">${dateStr}</div>
    </div>

    <!-- Stats strip -->
    <div style="display:flex;gap:.7rem;flex-wrap:wrap">
      <div style="background:white;border-radius:10px;padding:.7rem 1rem;flex:1;text-align:center;box-shadow:var(--shadow);min-width:80px">
        <div style="font-family:'Bebas Neue';font-size:1.6rem;color:var(--coral)">${onDate.length}</div>
        <div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.07em">Aizņemtas</div>
      </div>
      <div style="background:white;border-radius:10px;padding:.7rem 1rem;flex:1;text-align:center;box-shadow:var(--shadow);min-width:80px">
        <div style="font-family:'Bebas Neue';font-size:1.6rem;color:var(--moss)">${freeIds.length}</div>
        <div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.07em">Brīvas</div>
      </div>
      <div style="background:white;border-radius:10px;padding:.7rem 1rem;flex:1;text-align:center;box-shadow:var(--shadow);min-width:80px">
        <div style="font-family:'Bebas Neue';font-size:1.6rem;color:var(--gold)">${checkins.length}</div>
        <div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.07em">Ierodas</div>
      </div>
      <div style="background:white;border-radius:10px;padding:.7rem 1rem;flex:1;text-align:center;box-shadow:var(--shadow);min-width:80px">
        <div style="font-family:'Bebas Neue';font-size:1.6rem;color:var(--text-light)">${checkouts.length}</div>
        <div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.07em">Izbrauc</div>
      </div>
    </div>
  `;

  // Brīvās mājiņas
  if (freeIds.length > 0) {
    html += `
      <div style="background:rgba(94,138,96,.08);border:1px solid rgba(94,138,96,.2);border-radius:12px;padding:.9rem 1.1rem">
        <div style="font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--moss);margin-bottom:.5rem">✅ Brīvās mājiņas</div>
        <div style="display:flex;flex-wrap:wrap;gap:.4rem">
          ${freeIds.map(id => {
            const c = CABINS.find(x => x.id === id);
            return `<span style="background:white;border:1px solid rgba(94,138,96,.3);border-radius:8px;padding:.25rem .65rem;font-size:.78rem;color:var(--navy);font-weight:500">#${id} ${c.name.replace('Mājiņa ','')} </span>`;
          }).join('')}
        </div>
      </div>`;
  }

  // Rezervāciju kartes
  if (onDate.length === 0) {
    html += `<div class="no-bookings">Nav rezervāciju šajā datumā</div>`;
  } else {
    onDate.forEach(b => {
      html += renderBookingCard(b, ymd);
    });
  }

  panel.innerHTML = html;
}

function renderBookingCard(b, ymd) {
  const cabin  = CABINS.find(c => c.id === b.cabin_id) || {name:'Mājiņa #'+b.cabin_id, type:'double', color:'#2e5a7a'};
  const typeCls = cabin.type === 'lux' ? 'type-lux' : cabin.type === 'family' ? 'type-family' : 'type-double';
  const typeLabel = cabin.type === 'lux' ? '⭐ LUX' : cabin.type === 'family' ? 'Ģimenes' : 'Divvietīgā';

  const nights = Math.round((new Date(b.checkout_date) - new Date(b.checkin_date)) / 864e5);

  // Parse extras
  const extras = b.extras || {};
  const bedlinen = extras.bedlinen_qty > 0 ? extras.bedlinen_qty : 0;
  const extraList = Object.entries(EXTRA_NAMES)
    .filter(([k]) => (extras[k] || 0) > 0)
    .map(([k, label]) => `<span class="extra-chip chip-yes">${label} ×${extras[k]}</span>`);
  if (bedlinen > 0) extraList.unshift(`<span class="extra-chip chip-bedlinen">🛏 Gultasveļa ×${bedlinen}</span>`);
  if (extraList.length === 0) extraList.push(`<span class="extra-chip chip-none">Nav ekstra</span>`);

  // Notes — remove reservation number prefix
  const notes = (b.notes || '').replace(/^SK-\d{8}-\d{4}\s*\|\s*/, '').trim();

  // Status
  const statusCls   = b.status === 'confirmed' ? 's-confirmed' : b.status === 'cancelled' ? 's-cancelled' : 's-pending';
  const statusLabel = b.status === 'confirmed' ? '✅ Apstiprināta' : b.status === 'cancelled' ? '❌ Atcelta' : '⏳ Gaida';

  // Check-in / check-out indicator
  const isCheckin  = b.checkin_date  === ymd;
  const isCheckout = b.checkout_date === ymd;  // won't show (filter excludes it) but just in case
  const dayTag = isCheckin
    ? `<span style="font-size:.65rem;background:rgba(94,138,96,.15);color:var(--moss);border:1px solid rgba(94,138,96,.3);border-radius:8px;padding:.15rem .5rem;font-weight:700">📥 IERODAS</span>`
    : '';

  const resNr = (b.notes || '').match(/^(SK-\d{8}-\d{4})/)?.[1] || '';

  return `
    <div class="booking-card">
      <div class="booking-card-head" style="background:${cabin.color}">
        <div>
          <div class="bc-cabin">${cabin.name}</div>
          ${resNr ? `<div class="res-nr">${resNr}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.3rem">
          <span class="bc-type ${typeCls}">${typeLabel}</span>
          ${dayTag}
        </div>
      </div>
      <div class="booking-card-body">

        <div class="info-row">
          <div class="info-icon">👤</div>
          <div class="info-content">
            <div class="info-label">Viesis</div>
            <div class="info-val">${b.guest_name} · ${b.guest_count || '—'} pers.</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon">📞</div>
          <div class="info-content">
            <div class="info-label">Tālrunis</div>
            <div class="info-val"><a href="tel:${b.guest_phone}">${b.guest_phone}</a></div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon">✉️</div>
          <div class="info-content">
            <div class="info-label">E-pasts</div>
            <div class="info-val"><a href="mailto:${b.guest_email}">${b.guest_email}</a></div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon">📅</div>
          <div class="info-content">
            <div class="info-label">Periods</div>
            <div class="info-val">${b.checkin_date} → ${b.checkout_date} <span style="color:var(--text-light);font-size:.78rem">(${nights} naktis)</span></div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon">💶</div>
          <div class="info-content">
            <div class="info-label">Kopā</div>
            <div class="info-val" style="font-family:'Bebas Neue';font-size:1.2rem;color:var(--navy)">${b.total_price ? b.total_price + '€' : '—'}</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon">🎁</div>
          <div class="info-content">
            <div class="info-label">Papildus</div>
            <div class="extras-chips">${extraList.join('')}</div>
          </div>
        </div>

        ${notes ? `
        <div class="info-row">
          <div class="info-icon">💬</div>
          <div class="info-content">
            <div class="info-label">Komentārs</div>
            <div class="info-val" style="font-style:italic;color:var(--text-light)">${notes}</div>
          </div>
        </div>` : ''}

      </div>

      <!-- Status row -->
      <div class="status-row">
        <span class="status-badge ${statusCls}">${statusLabel}</span>
        <select class="status-select" id="sel-${b.id}" onchange="enableSave(${b.id})">
          <option value="pending"   ${b.status==='pending'  ?'selected':''}>⏳ Gaida</option>
          <option value="confirmed" ${b.status==='confirmed'?'selected':''}>✅ Apstiprināta</option>
          <option value="cancelled" ${b.status==='cancelled'?'selected':''}>❌ Atcelta</option>
        </select>
        <button class="status-save" id="save-${b.id}" onclick="saveStatus(${b.id})" style="display:none">Saglabāt</button>
        <span class="status-saved" id="saved-${b.id}">✓ Saglabāts</span>
      </div>
    </div>
  `;
}

function enableSave(bookingId) {
  document.getElementById('save-' + bookingId).style.display = 'inline-block';
  document.getElementById('saved-' + bookingId).style.display = 'none';
}

async function saveStatus(bookingId) {
  const sel = document.getElementById('sel-' + bookingId);
  const newStatus = sel.value;
  try {
    const { error } = await sb.from('bookings').update({ status: newStatus }).eq('id', bookingId);
    if (error) throw error;
    // Update local data
    const b = bookings.find(x => x.id === bookingId);
    if (b) b.status = newStatus;
    document.getElementById('save-'  + bookingId).style.display = 'none';
    document.getElementById('saved-' + bookingId).style.display = 'inline';
    showToast('✅ Statuss atjaunināts');
    // Re-render to reflect change
    setTimeout(() => {
      renderTodayStats();
      renderCalendar();
      if (selectedDate) renderDetail(selectedDate);
    }, 800);
  } catch(e) {
    showToast('❌ Kļūda: ' + e.message, true);
  }
}

/* ── HELPERS ─────────────────────────────────────────────────────── */
function toYMD(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? 'var(--coral)' : 'var(--moss)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── AUTO-LOGIN CHECK ────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('sk_admin') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pwd-input').focus();
  }
});
</script>
